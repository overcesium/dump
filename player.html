<html>
<head>
<meta charset="UTF-8">

<!-- Font DotGothic16 -->
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

<script src="https://unpkg.com/wavesurfer.js"></script>

<style>
/* =========================
VARIABILI COLORI E FONT
========================= */
:root{
--bg:#111;
--text:#fff;
--accent:#ff0055;
--box:#1c1c1c;
--hover:#333;
--wave:#ff0055;
--progress:#fff;
--font:"DotGothic16", monospace;
}

/* =========================
BASE
========================= */
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  margin:40px;
  max-width:900px;
}
h2{margin-bottom:20px;}

/* =========================
WAVEFORM
========================= */
#waveform{margin-bottom:15px;}

/* =========================
CONTROLLI
========================= */
#controls{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:20px;
}
button{
  background:none;
  border:none;
  cursor:pointer;
}
button img{
  width:36px;
  height:36px;
}
#time{font-size:12px;}

/* =========================
PLAYLIST
========================= */
#playlist{
  background:var(--box);
  border:1px solid var(--hover);
  max-height:350px;
  overflow-y:auto;
  padding:4px 0;
}
.item{
  padding:8px;
  cursor:pointer;
  border-bottom:1px solid var(--hover);
}
.item:hover{
  background:var(--hover);
}
.active{
  background:var(--accent);
}
.folder{
  color:var(--accent);
  font-weight:bold;
}
#breadcrumb{
  margin-bottom:8px;
  font-size:13px;
  color:var(--accent);
}
</style>
</head>

<body>

<h2>Trashy Music Player</h2>

<div id="waveform"></div>

<div id="controls">
  <button id="prev"><img src="icons/prev.png"></button>
  <button id="play"><img src="icons/play.png"></button>
  <button id="next"><img src="icons/next.png"></button>
  <button id="autoplay"><img src="icons/autoplay.png"></button>
  <button id="back" style="display:none;"><img src="icons/folder.png"> Back</button>
  <div id="time">0:00 / 0:00</div>
</div>

<div id="breadcrumb"></div>

<h3>Library</h3>
<div id="playlist"></div>

<script>
/* =========================
CONFIG
========================= */
const repo = "overcesium/dump";
const base = "https://api.github.com/repos/"+repo+"/contents/mp3";

let tracks=[];
let current=0;
let autoplay=true;
let folderStack=[]; // per breadcrumb

/* =========================
WAVESURFER
========================= */
const wavesurfer = WaveSurfer.create({
  container:"#waveform",
  waveColor:getComputedStyle(document.documentElement).getPropertyValue('--wave'),
  progressColor:getComputedStyle(document.documentElement).getPropertyValue('--progress'),
  height:120
});

/* =========================
ELEMENTI
========================= */
const playlist=document.getElementById("playlist");
const backBtn=document.getElementById("back");
const breadcrumb=document.getElementById("breadcrumb");

/* =========================
FUNZIONI PER CARTE
========================= */
function loadFolders(){
  playlist.innerHTML="";
  backBtn.style.display="none";
  breadcrumb.innerText="Home";
  folderStack=[];
  
  fetch(base)
  .then(r=>r.json())
  .then(items=>{
    items.forEach(item=>{
      if(item.type==="dir"){
        const div=document.createElement("div");
        div.className="item folder";
        div.innerText="📁 "+item.name;
        div.onclick=()=>{
          folderStack.push(item.name);
          loadFolder(item.path);
        };
        playlist.appendChild(div);
      }
    });
  });
}

function loadFolder(path){
  playlist.innerHTML="";
  backBtn.style.display="inline-block";
  updateBreadcrumb();
  
  fetch("https://api.github.com/repos/"+repo+"/contents/"+path)
  .then(r=>r.json())
  .then(files=>{
    tracks = files.filter(f=>f.name.endsWith(".mp3"));
    files.forEach((file,i)=>{
      if(file.type==="file" && file.name.endsWith(".mp3")){
        const div=document.createElement("div");
        div.className="item";
        div.innerText=file.name;
        div.onclick=()=>{
          current=i;
          loadTrack(i);
        };
        playlist.appendChild(div);
      }
    });
  });
}

function updateBreadcrumb(){
  breadcrumb.innerText = "Home / " + folderStack.join(" / ");
}

/* =========================
BACK BUTTON
========================= */
backBtn.onclick = ()=>{
  folderStack.pop();
  if(folderStack.length===0){
    loadFolders();
  } else {
    // ricostruire path
    const path = "mp3/" + folderStack.join("/");
    loadFolder(path);
  }
};

/* =========================
LOAD TRACK
========================= */
function loadTrack(i){
  highlight(i);
  wavesurfer.load(tracks[i].download_url);
}

function highlight(i){
  document.querySelectorAll(".item").forEach(el=>el.classList.remove("active"));
  const active=document.querySelectorAll(".item")[i];
  if(active) active.classList.add("active");
}

/* =========================
READY
========================= */
wavesurfer.on("ready",()=>{
  updateTime();
  wavesurfer.play();
});

/* =========================
TIME
========================= */
wavesurfer.on("audioprocess",updateTime);
wavesurfer.on("seek",updateTime);

function updateTime(){
  const t=wavesurfer.getCurrentTime();
  const d=wavesurfer.getDuration();
  document.getElementById("time").innerText=format(t)+" / "+format(d);
}

function format(sec){
  sec=Math.floor(sec);
  const m=Math.floor(sec/60);
  const s=sec%60;
  return m+":"+(s<10?"0"+s:s);
}

/* =========================
AUTOPLAY NEXT
========================= */
wavesurfer.on("finish",()=>{
  if(autoplay && current<tracks.length-1){
    current++;
    setTimeout(()=>{loadTrack(current)},50);
  }
});

/* =========================
CONTROLLI
========================= */
document.getElementById("play").onclick=()=>wavesurfer.playPause();
document.getElementById("next").onclick=()=>{
  if(current<tracks.length-1){current++; loadTrack(current);}
};
document.getElementById("prev").onclick=()=>{
  if(current>0){current--; loadTrack(current);}
};
document.getElementById("autoplay").onclick=()=>{autoplay=!autoplay;};

/* =========================
INIT
========================= */
loadFolders();
</script>

</body>
</html>
