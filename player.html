<html>
<head>
<script src="https://unpkg.com/wavesurfer.js"></script>
<style>
/* ============================= */
/* Configurazione colori e font */
/* ============================= */
:root {
  --font-player: "DotGothic16", sans-serif;
  --color-bg: #121212;
  --color-text: #FFFFFF;
  --color-wave: #FF0000;
  --color-wave-progress: #FFFFFF;
  --color-button-bg: #333333;
  --color-button-text: #FFFFFF;
  --color-button-hover: #555555;
  --color-autoplay-on: #8f8;
  --color-autoplay-off: #f88;
  --color-playlist-bg: #1e1e1e;
  --color-playlist-text: #FFFFFF;
  --color-playlist-hover: #333333;
  --color-playlist-active: #555555;
  --color-time-text: #CCCCCC;
}

body {
  font-family: var(--font-player);
  margin: 40px;
  max-width: 900px;
  background-color: var(--color-bg);
  color: var(--color-text);
}

#waveform {
  margin-bottom: 10px;
}

#controls {
  margin-bottom: 20px;
}

button {
  font-family: var(--font-player);
  background-color: var(--color-button-bg);
  color: var(--color-button-text);
  border: none;
  padding: 8px 12px;
  cursor: pointer;
  border-radius: 4px;
}

button:hover {
  background-color: var(--color-button-hover);
}

#time {
  font-size: 12px;
  margin-top: 6px;
  color: var(--color-time-text);
}

#playlist {
  max-height: 300px;
  overflow-y: auto;
  border-top: 1px solid var(--color-playlist-hover);
  background-color: var(--color-playlist-bg);
}

#playlist div {
  cursor: pointer;
  padding: 8px;
  border-bottom: 1px solid var(--color-playlist-hover);
  color: var(--color-playlist-text);
}

#playlist div:hover {
  background-color: var(--color-playlist-hover);
}

#playlist .active {
  background-color: var(--color-playlist-active);
}
</style>
</head>

<body>
<h2>Trashy music player!</h2>
<div id="waveform"></div>

<div id="controls">
  <button id="prev">previous track</button>
  <button id="play">play / pause</button>
  <button id="next">next track</button>
  <button id="autoplay-toggle">Autoplay: ON</button>
  <div id="time">0:00 / 0:00</div>
</div>

<h3>Tracks</h3>
<div id="playlist"></div>

<script>
const api="https://api.github.com/repos/overcesium/dump/contents/mp3";

let tracks=[];
let current=0;
let nextTrackIndex = null;  // traccia da riprodurre al ready
let autoplay=true;           // toggle globale autoplay

const wavesurfer=WaveSurfer.create({
  container:"#waveform",
  waveColor: getComputedStyle(document.documentElement).getPropertyValue('--color-wave').trim(),
  progressColor: getComputedStyle(document.documentElement).getPropertyValue('--color-wave-progress').trim(),
  height:120
});

const playlist=document.getElementById("playlist");

// Carica lista tracce da GitHub
fetch(api)
.then(r=>r.json())
.then(files=>{
  tracks = files.filter(f=>f.name.endsWith(".mp3"));

  tracks.forEach((track,i)=>{
    const item=document.createElement("div");
    item.innerText=track.name;

    item.onclick=()=>{
      nextTrackIndex = i;
      loadTrack(i);
    };

    playlist.appendChild(item);
  });

  loadTrack(0);
});

function loadTrack(i){
  highlightTrack(i);
  wavesurfer.load(tracks[i].download_url);
}

function highlightTrack(i){
  current = i;
  document.querySelectorAll("#playlist div").forEach(el=>el.classList.remove("active"));
  const active=document.querySelectorAll("#playlist div")[i];
  active.classList.add("active");
  active.scrollIntoView({behavior:"smooth", block:"nearest"});
}

// Play automatico al ready
wavesurfer.on("ready", ()=>{
  updateTime();
  if(nextTrackIndex !== null){
    wavesurfer.play();
    nextTrackIndex = null; 
  }
});

wavesurfer.on("audioprocess", updateTime);
wavesurfer.on("seek", updateTime);

function updateTime(){
  const t = wavesurfer.getCurrentTime();
  const d = wavesurfer.getDuration();
  document.getElementById("time").innerText = format(t)+" / "+format(d);
}

function format(sec){
  sec = Math.floor(sec);
  const m = Math.floor(sec/60);
  const s = sec%60;
  return m+":"+(s<10?"0"+s:s);
}

// Fine traccia → autoplay next
wavesurfer.on("finish", ()=>{
  if(autoplay && current < tracks.length-1){
    nextTrackIndex = current+1;
    setTimeout(()=>{
      loadTrack(nextTrackIndex);
    }, 50);
  }
});

// Controlli
document.getElementById("play").onclick = ()=>{wavesurfer.playPause();};
document.getElementById("next").onclick = ()=>{
  if(current<tracks.length-1){
    nextTrackIndex = current+1;
    loadTrack(current+1);
  }
};
document.getElementById("prev").onclick = ()=>{
  if(current>0){
    nextTrackIndex = current-1;
    loadTrack(current-1);
  }
};

// Toggle Autoplay
const autoplayBtn = document.getElementById("autoplay-toggle");
autoplayBtn.onclick = () => {
  autoplay = !autoplay;
  autoplayBtn.innerText = "Autoplay: " + (autoplay ? "ON" : "OFF");
  autoplayBtn.style.backgroundColor = autoplay ? getComputedStyle(document.documentElement).getPropertyValue('--color-autoplay-on').trim()
                                                : getComputedStyle(document.documentElement).getPropertyValue('--color-autoplay-off').trim();
};
</script>
</body>
</html>
