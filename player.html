<script>

const api="https://api.github.com/repos/overcesium/dump/contents/mp3";

let tracks=[];
let current=0;
let autoplay=false;

const wavesurfer=WaveSurfer.create({
container:"#waveform",
waveColor:"#FF0000",
progressColor:"#FFFFFF",
height:120
});

fetch(api)
.then(r=>r.json())
.then(files=>{

tracks=files.filter(f=>f.name.endsWith(".mp3"));

const playlist=document.getElementById("playlist");

tracks.forEach((track,i)=>{

const item=document.createElement("div");
item.innerText=track.name;

item.onclick=()=>{
autoplay=true;
loadTrack(i);
};

playlist.appendChild(item);

});

loadTrack(0);

});

function loadTrack(i){

current=i;

document.querySelectorAll("#playlist div")
.forEach(el=>el.classList.remove("active"));

document.querySelectorAll("#playlist div")[i]
.classList.add("active");

wavesurfer.load(tracks[i].download_url);

}

wavesurfer.on("ready",()=>{

if(autoplay){
wavesurfer.play();
}

});

wavesurfer.on("finish",()=>{

current++;

if(current<tracks.length){

autoplay=true;
loadTrack(current);

}

});

document.getElementById("play").onclick=()=>{
wavesurfer.playPause();
};

</script>
