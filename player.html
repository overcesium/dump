<!DOCTYPE html>
<html>
<head>

<script src="https://unpkg.com/wavesurfer.js"></script>

<style>

body{
font-family:"Pixelify Sans", sans-serif;
margin:40px;
max-width:900px;
}

#waveform{
margin-bottom:20px;
}

#playlist div{
cursor:pointer;
padding:6px;
border-bottom:1px solid #eee;
}

#playlist div:hover{
background:#f3f3f3;
}

#playlist .active{
background:#ddd;
}

</style>

</head>

<body>

<h2>Audio Dump</h2>

<div id="waveform"></div>

<button id="play">play / pause</button>

<h3>Tracks</h3>

<div id="playlist"></div>

<script>

const api="https://api.github.com/repos/overcesium/dump/contents/mp3";

let tracks=[];
let current=0;

const wavesurfer=WaveSurfer.create({
container:"#waveform",
waveColor:"#FF0000",
progressColor:"#FFFFFF",
height:120
});

fetch(api)
.then(r=>r.json())
.then(files=>{

tracks=files.filter(f=>f.name.endsWith(".mp3"));

const playlist=document.getElementById("playlist");

tracks.forEach((track,i)=>{

const item=document.createElement("div");
item.innerText=track.name;

item.onclick=()=>{
loadTrack(i);
wavesurfer.play();
};

playlist.appendChild(item);

});

loadTrack(0);

});

function loadTrack(i){

current=i;

document.querySelectorAll("#playlist div")
.forEach(el=>el.classList.remove("active"));

document.querySelectorAll("#playlist div")[i]
.classList.add("active");

wavesurfer.load(tracks[i].download_url);

}

wavesurfer.on("finish",()=>{

current++;

if(current<tracks.length){

loadTrack(current);
wavesurfer.play();

}

});

document.getElementById("play").onclick=()=>{
wavesurfer.playPause();
};

</script>

</body>
</html>
